name: sqlgen-mlops

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/dvc &&
      mc mb --ignore-existing local/mlflow &&
      mc mb --ignore-existing local/models
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      /bin/sh -c "pip install --quiet boto3 &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination s3://mlflow
      --allowed-hosts 'mlflow:5000,localhost:5000,127.0.0.1:5000'"
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 30

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_URL: http://localhost:4200/api
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  pipeline:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.pipeline
    depends_on:
      minio-init:
        condition: service_completed_successfully
      prefect:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DVC_REMOTE_ENDPOINT: http://minio:9000
    volumes:
      # Mount the repo so DVC state/outputs land on the host workspace.
      - ..:/app
      - pipeline_venv:/app/.docker-venv

  training:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.train
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      prefect:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DVC_REMOTE_ENDPOINT: http://minio:9000
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - ..:/app
      - training_venv:/app/.docker-venv
      - hf_cache:/root/.cache/huggingface
    # Requires the NVIDIA Container Toolkit on the host. For a CPU-only smoke
    # run, comment this block out (and set train.limit in params.yaml).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  checkpoint-postgres:
    image: postgres:16-alpine
    container_name: checkpoint-postgres
    environment:
      POSTGRES_USER: ${CHECKPOINT_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CHECKPOINT_DB_PASSWORD:-postgres}
      POSTGRES_DB: langgraph_checkpoints
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - checkpoint_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHECKPOINT_DB_USER:-postgres} -d langgraph_checkpoints"]
      interval: 5s
      timeout: 5s
      retries: 20

  serving-init:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.serving
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ../models/serving:/app/models/serving
    command: ["python", "-m", "sqlgen.serving.prepare"]

  vllm-pruner:
    image: vllm/vllm-openai:latest
    container_name: vllm-pruner
    ports:
    - 8001:8001
    volumes:
    - ../models/serving/pruner:/models
    ipc: host
    restart: unless-stopped
    environment:
      VLLM_WSL2_ENABLE_PIN_MEMORY: "1"
    depends_on:
      serving-init:
        condition: service_completed_successfully
    command: >
      --model /models/base
      --served-model-name schema-pruner-base
      --quantization bitsandbytes
      --load-format bitsandbytes
      --enable-lora
      --lora-modules schema-pruner=/models/adapter
      --max-model-len 8192
      --gpu-memory-utilization 0.72
      --host 0.0.0.0
      --port 8001
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-sqlgen:
    image: vllm/vllm-openai:latest
    container_name: vllm-sqlgen
    ports:
    - 8000:8000
    volumes:
    - ../models/serving/sqlgen:/models
    ipc: host
    restart: unless-stopped
    environment:
      VLLM_WSL2_ENABLE_PIN_MEMORY: "1"
    depends_on:
      serving-init:
        condition: service_completed_successfully
    command: >
      --model /models/base
      --served-model-name sqlgen presenter
      --quantization bitsandbytes
      --load-format bitsandbytes
      --max-model-len 8192
      --gpu-memory-utilization 0.72
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  inference-api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.serving
    depends_on:
      vllm-pruner:
        condition: service_healthy
      vllm-sqlgen:
        condition: service_healthy
      checkpoint-postgres:
        condition: service_healthy
    environment:
      PRUNER_BASE_URL: ${PRUNER_BASE_URL:-http://vllm-pruner:8001/v1}
      SQLGEN_BASE_URL: ${SQLGEN_BASE_URL:-http://vllm-sqlgen:8000/v1}
      DB_SERVICE_URL: ${DB_SERVICE_URL:-http://host.docker.internal:8003}
      CHECKPOINT_DB_URI: postgresql://${CHECKPOINT_DB_USER:-postgres}:${CHECKPOINT_DB_PASSWORD:-postgres}@checkpoint-postgres:5432/langgraph_checkpoints?sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "api.local:10.48.237.1"
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  minio_data:
  mlflow_data:
  prefect_data:
  pipeline_venv:
  training_venv:
  hf_cache:
  checkpoint_pg_data:
