name: sqlgen-mlops

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/dvc &&
      mc mb --ignore-existing local/mlflow &&
      mc mb --ignore-existing local/models
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    # The official image ships without boto3, which the MinIO artifact store needs.
    # --artifacts-destination proxies artifacts through the server, so clients on
    # the host only need MLFLOW_TRACKING_URI (no S3 credentials).
    command: >
      /bin/sh -c "pip install --quiet boto3 &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination s3://mlflow
      --allowed-hosts 'mlflow:5000,localhost:5000,127.0.0.1:5000'"
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 30

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_URL: http://localhost:4200/api
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  pipeline:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.pipeline
    depends_on:
      minio-init:
        condition: service_completed_successfully
      prefect:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DVC_REMOTE_ENDPOINT: http://minio:9000
    volumes:
      # Mount the repo so DVC state/outputs land on the host workspace.
      - ..:/app
      - pipeline_venv:/app/.docker-venv

  training:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.train
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      prefect:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DVC_REMOTE_ENDPOINT: http://minio:9000
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      # Mount the repo so the adapter/reports land on the host workspace.
      - ..:/app
      - training_venv:/app/.docker-venv
      # Keep the downloaded base model across runs.
      - hf_cache:/root/.cache/huggingface
    # Requires the NVIDIA Container Toolkit on the host. For a CPU-only smoke
    # run, comment this block out (and set train.limit in params.yaml).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  inference:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.train
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      prefect:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DVC_REMOTE_ENDPOINT: http://minio:9000
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - ..:/app
      - training_venv:/app/.docker-venv
      - hf_cache:/root/.cache/huggingface
    command: ["python", "flows/inference.py"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  minio_data:
  mlflow_data:
  prefect_data:
  pipeline_venv:
  training_venv:
  hf_cache:
