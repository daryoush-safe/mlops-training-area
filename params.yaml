paths:
  raw_zip: spider_data.zip
  raw_dir: data/raw/spider
  interim_dir: data/interim
  processed_dir: data/processed/schema_pruner
  reports_dir: reports

splits:
  train:
    - train_spider.json
    - train_others.json
  val:
    - dev.json

prune:
  dialect: sqlite
  include_primary_keys: true
  include_foreign_keys: true
  enable_fallback: true

serialization:
  style: verbose # verbose | compact
  include_types: true

validation:
  max_parse_failure_rate: 0.02
  max_fallback_rate: 0.05
  min_examples_per_split: 100

models:
  pruner:
    base: Qwen/Qwen2.5-Coder-1.5B-Instruct
    revision: main
    mirror_bucket: models
    mirror_prefix: base
    load_in_4bit: true
  sqlgen:
    base: Qwen/Qwen2.5-Coder-3B-Instruct
    revision: main
    mirror_bucket: models
    mirror_prefix: base
    load_in_4bit: true

presenter:
  base_model: sqlgen # registry key whose bare base weights the presenter loads (zero-shot)
  max_new_tokens: 320
  max_preview_rows: 20
  max_preview_cols: 12
  chart_types: [bar, line, pie, scatter, area, histogram]

train:
  seed: 42
  epochs: 2
  learning_rate: 2.0e-4
  batch_size: 1
  grad_accum: 16
  max_seq_len: 1024
  warmup_ratio: 0.03
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  limit: null # set to e.g. 64 for a smoke run
  output_dir: models/schema_pruner
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

mlflow:
  experiment: schema-pruner
  registered_model: schema-pruner-qwen2.5-coder-1.5b

inference:
  max_retries: 2
  prune_max_new_tokens: 256
  generator_max_new_tokens: 320
  low_vram: false # set true (or SQLGEN_LOW_VRAM=1) on GPUs around 4GB

eval:
  max_new_tokens: 256
  num_samples: null # null = full val split
  batch_size: 1
  gates:
    min_table_recall: 0.90
    min_column_recall: 0.80
    max_unparseable_rate: 0.01
