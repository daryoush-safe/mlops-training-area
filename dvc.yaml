stages:
  ingest:
    cmd: python -m sqlgen.data.ingest
    deps:
      - spider_data.zip
      - src/sqlgen/data/ingest.py
    params:
      - paths
    outs:
      - data/raw/spider

  extract_schema:
    cmd: python -m sqlgen.data.extract_schema
    deps:
      - data/raw/spider/tables.json
      - src/sqlgen/data/extract_schema.py
      - src/sqlgen/data/schema.py
    params:
      - paths
    outs:
      - data/interim/schemas.json

  extract_pairs:
    cmd: python -m sqlgen.data.extract_pairs
    deps:
      - data/raw/spider
      - src/sqlgen/data/extract_pairs.py
    params:
      - paths
      - splits
    outs:
      - data/interim/pairs

  build_labels:
    cmd: python -m sqlgen.data.build_labels
    deps:
      - data/interim/schemas.json
      - data/interim/pairs
      - src/sqlgen/data/build_labels.py
      - src/sqlgen/data/prune.py
      - src/sqlgen/data/schema.py
    params:
      - paths
      - splits
      - prune
    outs:
      - data/interim/labeled
      - reports/prune_report.json:
          cache: false

  validate:
    cmd: python -m sqlgen.data.validate
    deps:
      - data/interim/labeled
      - reports/prune_report.json
      - src/sqlgen/data/validate.py
    params:
      - paths
      - validation
    metrics:
      - reports/validation.json:
          cache: false

  build_dataset:
    cmd: python -m sqlgen.features.build_dataset
    deps:
      - data/interim/labeled
      - data/interim/schemas.json
      - reports/validation.json
      - src/sqlgen/features/build_dataset.py
      - src/sqlgen/data/schema.py
    params:
      - paths
      - splits
      - serialization
    outs:
      - data/processed/schema_pruner

  train:
    cmd: python -m sqlgen.training.train
    deps:
      - data/processed/schema_pruner
      - src/sqlgen/prompts/pruner.py
      - src/sqlgen/tracking.py
      - src/sqlgen/training/dataset.py
      - src/sqlgen/training/model.py
      - src/sqlgen/training/train.py
    params:
      - model
      - train
      - mlflow
    outs:
      - models/schema_pruner
      - reports/train_report.json:
          cache: false

  evaluate:
    cmd: python -m sqlgen.training.evaluate
    deps:
      - data/processed/schema_pruner
      - models/schema_pruner
      - reports/train_report.json
      - src/sqlgen/evaluation/pruner.py
      - src/sqlgen/prompts/pruner.py
      - src/sqlgen/training/evaluate.py
      - src/sqlgen/training/model.py
    params:
      - model
      - eval
      - mlflow
    metrics:
      - reports/eval_schema_pruner.json:
          cache: false

  register:
    cmd: python -m sqlgen.registry.register_pruner
    deps:
      - reports/eval_schema_pruner.json
      - reports/train_report.json
      - src/sqlgen/registry/promotion.py
      - src/sqlgen/registry/register_pruner.py
    params:
      - eval
      - mlflow
    outs:
      - reports/registration.json:
          cache: false
